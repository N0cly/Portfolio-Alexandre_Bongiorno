services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    env_file: .env
    environment:
      UPLOAD_DIR: /data/uploads
    ports:
      - "127.0.0.1:3003:3000"
    volumes:
      - /srv/data/portfolio-bongiorno/uploads:/data/uploads
    restart: unless-stopped